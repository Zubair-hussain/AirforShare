name = "airforshare-backend"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "R2"
bucket_name = "airforshare-files"

[[d1_databases]]
binding = "DB"
database_name = "airforshare-db"
database_id = "05d99616-5f06-41f7-b898-f0b454d5b08f"

[triggers]
crons = ["*/30 * * * *"]    # Run cleanup every 30 minutes

[vars]
MAX_FILE_SIZE = "52428800"              # 50MB in bytes
COMPRESSION_THRESHOLD = "104857600"     # 100MB in bytes - files larger than this will be compressed
ROOM_EXPIRY_MINUTES = "30"
FRONTEND_URL = "https://airfor-share.vercel.app"  # For development; change to your actual frontend URL for production

# Supabase Configuration (optional - for redundancy and hybrid storage)
# Add these environment variables in your Cloudflare Workers settings dashboard:
# SUPABASE_URL = your_supabase_url
# SUPABASE_KEY = your_supabase_anon_key

# Security Headers (applied by Cloudflare automatically)
# - HSTS (HTTP Strict Transport Security)
# - CSP (Content Security Policy)
# - X-Content-Type-Options: nosniff
# - X-Frame-Options: DENY
# - X-XSS-Protection
